spring.application.name=file-manager-service

server.port=${PORT:8082}

# Max file size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ?? DigitalOcean Spaces (S3-compatible) ??????????????????????????????????
# Set these as Environment Variables on your Droplet / App Platform:
#   SPACES_ACCESS_KEY   ? your Spaces Access Key
#   SPACES_SECRET_KEY   ? your Spaces Secret Key
#   SPACES_ENDPOINT     ? https://sgp1.digitaloceanspaces.com   (your region endpoint)
#   SPACES_REGION       ? sgp1                                  (your region slug)
#   SPACES_BUCKET       ? your-bucket-name
spaces.access.key=${SPACES_ACCESS_KEY}
spaces.secret.key=${SPACES_SECRET_KEY}
spaces.endpoint=${SPACES_ENDPOINT:https://sgp1.digitaloceanspaces.com}
spaces.region=${SPACES_REGION:sgp1}
spaces.bucket=${SPACES_BUCKET:temuulen-file}
# Public CDN base URL: https://{bucket}.{region}.digitaloceanspaces.com
spaces.cdn.base=${SPACES_CDN_BASE:https://temuulen-file.sgp1.digitaloceanspaces.com}

# ?? SOAP Service URL for token validation ?????????????????????????????????
# Set SOAP_SERVICE_URL env var e.g. http://192.34.59.227:8080
soap.service.url=${SOAP_SERVICE_URL:http://localhost:8080}
# Set SOAP_AUTH_REQUIRED=false to disable SOAP token validation (when SOAP service is unavailable)
soap.auth.required=${SOAP_AUTH_REQUIRED:false}